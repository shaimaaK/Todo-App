{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'todolist/index.css' %}" />
    <title>Document</title>
</head>
<body style="background-color: #ECECEC;">
    <div class="container">
        <h1>What to do today</h1>
        <form>
            <div class="container-fluid">
                <div class="row">
                    <div class="input-group p-0">
                        <div class="form-floating  col-xl-10 col-lg-10 col-md-10 col-sm-8">
                            <input type="text" class="form-control" id="floatingInput" placeholder="Add a Task">
                            <label for="floatingInput">Add a Task</label>
                        </div>
                        <button class="btn btn-outline-dark" ></span><i class="bi bi-plus-circle-fill"></i></button>
                    </div>
                </div>
            </div>
            <div style="padding-bottom: 20px; padding-top:20px">
                <button class=" btn btn-primary btn-sm" value="Delete Completed"><i class="bi bi-trash-fill"></i> Delete Compelted</button>
                <button class="btn btn-danger btn-sm" value="Delete All"><i class="bi bi-trash-fill"></i> Delete All</button>
            </div>
            <div class="card">
                <div class="card-body">
                    <span class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                        <label class="form-check-label" for="flexCheckDefault">
                            <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
                        </label>
                    </span>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.6.0/dist/umd/popper.min.js" integrity="sha384-KsvD1yqQ1/1+IA7gi3P0tyJcT3vR+NdBTt13hSJ2lnve8agRGXTTyNaBYmCR/Nwi" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.min.js" integrity="sha384-nsg8ua9HAw1y0W1btsyWgBklPnCUAFLuTMS2G72MMONqmOymq585AcH49TLBQObG" crossorigin="anonymous"></script>
</body>
</html>
